version: 1
rules:
  - id: my-api-key
    name: Generic API Key
    description: Example rule with custom anchor and regex
    severity: high
    type: regex
    pattern: 'api[-_ ]?key\\s*[:=]\\s*["'']([A-Za-z0-9]{16,})'
    flags: g
    keywords:
      - api
      - key
    allowlist:
      - example
  - id: custom-entropy
    name: Custom Base64 Token
    description: Custom entropy check for base64-like strings
    severity: medium
    type: entropy
    pattern: '[A-Za-z0-9+/=]{24,}'
    entropy:
      enabled: true
      min_length: 24
      entropy_threshold: 4.4
      window_size: 64
      charset: base64
    keywords:
      - token
      - secret
